---
deployment:
  tasks:
    - export DEPLOYPATH=/home/iainmcok/public_html/site/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp index.php $DEPLOYPATH
    - /bin/cp -R assets $DEPLOYPATH
    - /bin/cp -R includes $DEPLOYPATH
    - /bin/cp -R saas-lab $DEPLOYPATH
    - /bin/cp -R auth $DEPLOYPATH
    - /bin/cp -R admin $DEPLOYPATH
    - /bin/cp -R data $DEPLOYPATH
    - /bin/cp -R scripts $DEPLOYPATH
    - /bin/cp -R x $DEPLOYPATH
    # VibeKB project page is now served by index.php; remove the stale static file so it
    # does not win the directory index on the server (cp never deletes).
    - /bin/rm -f $DEPLOYPATH/saas-lab/index.html
